<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North Studios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }
        .logo h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 1rem;
            color: #fff;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 4rem;
            font-size: 1.2rem;
        }
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }
        .artist-card {
            background-color: #111;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 2rem;
            transition: transform 0.3s, border-color 0.3s;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .artist-card:hover {
            transform: translateY(-5px);
            border-color: #555;
        }
        .artist-card img {
            width: 100%;
            max-width: 200px;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .artist-card h2 {
            font-size: 2rem;
            font-weight: 700;
        }
        .artist-card p {
            color: #aaa;
            font-size: 0.9rem;
        }
        footer {
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
        footer a {
            color: #aaa;
            text-decoration: none;
        }

        /* Seletor de idioma */
        .lang-switcher {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1001;
            display: flex;
            gap: 0.5rem;
        }
        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: #fff;
        }
        .lang-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }
    </style>
</head>
<body>

<!-- Seletor de Idioma -->
<div class="lang-switcher" id="langSwitcher">
    <button class="lang-btn" onclick="changeLanguage('pt-br')" id="btn-pt">PT</button>
    <button class="lang-btn" onclick="changeLanguage('en')" id="btn-en">EN</button>
</div>

<div class="container">
    <div class="logo">
        <h1>North Studios</h1>
        <p class="subtitle" data-i18n="hubSubtitle">Selo Independente</p>
    </div>

    <div class="artists-grid">
        <!-- Card do Soltryx -->
        <a href="soltryx.html" class="artist-card">
            <img src="covers/soltryx/Smooth-changes.jpg" alt="Soltryx" onerror="this.src='https://via.placeholder.com/200x200/222/fff?text=SOLTRYX'">
            <h2>Soltryx</h2>
            <p data-i18n="hubSoltryxDesc">Explorando novos universos sonoros através de beats eletrônicos e jazz.</p>
        </a>

        <!-- Card do Orange Isle -->
        <a href="orangeisle.html" class="artist-card">
            <img src="covers/orangeisle/exploration.jpg" alt="Orange Isle" onerror="this.src='https://via.placeholder.com/200x200/222/fff?text=ORANGE+ISLE'">
            <h2>Orange Isle</h2>
            <p data-i18n="hubOrangeDesc">Novos sentimentos sonoros. Bossa nova e jazz introspectivo.</p>
        </a>
    </div>

    <footer>
        <p>© 2026 North Studios. <a href="mailto:northstudios@gmail.com">northstudios@gmail.com</a></p>
    </footer>
</div>

<!-- Scripts de tradução -->
<script src="lang/pt.js"></script>
<script src="lang/en.js"></script>
<script src="i18n.js"></script>

<!-- Marca o idioma ativo no seletor -->
<script>
  (function() {
    const currentLang = localStorage.getItem('i18n_lang') || 'pt-br';
    const btnPT = document.getElementById('btn-pt');
    const btnEN = document.getElementById('btn-en');
    if (btnPT && btnEN) {
      btnPT.classList.toggle('active', currentLang === 'pt-br');
      btnEN.classList.toggle('active', currentLang === 'en');
    }
  })();
</script>
</body>
</html>
