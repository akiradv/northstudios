<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North Studios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon/northstudios/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon/northstudios/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon/northstudios/favicon-16x16.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 70%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            position: relative;
        }
        
        /* 🌟 Bolhas de luz com blur */
        .light-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ffffff, #666666);
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ffffff, #888888);
            bottom: -50px;
            right: -50px;
        }
        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ffffff, #aaaaaa);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .logo h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            font-weight: 400;
            letter-spacing: 6px;
            margin-bottom: 0.5rem;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        .north-star {
            font-size: 3rem;
            color: #fff;
            opacity: 0.8;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 0.8rem;
            font-size: 1.2rem;
        }
        .divider {
            width: 60px;
            height: 1px;
            background: #fff;
            margin: 0 auto 2rem;
            opacity: 0.5;
        }
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .artist-card {
            background-color: #111;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 1.5rem;
            transition: transform 0.3s, border-color 0.3s;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        .artist-card:hover {
            transform: translateY(-8px);
            border-color: #555;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
        }
        .artist-card img {
            width: 100%;
            max-width: 180px;
            border-radius: 8px;
            margin-bottom: 0.3rem;
            transition: transform 0.3s;
        }
        .artist-card:hover img {
            transform: scale(1.03);
        }
        .artist-card h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 2px;
        }
        .artist-card p {
            color: #aaa;
            font-size: 0.9rem;
        }
        footer {
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
        footer a {
            color: #aaa;
            text-decoration: none;
        }

        /* Seletor de idioma */
        .lang-switcher {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1001;
            display: flex;
            gap: 0.5rem;
        }
        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: #fff;
        }
        .lang-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }
    </style>
</head>
<body>

<!-- 🌟 Bolhas de luz decorativas -->
<div class="light-orb orb-1"></div>
<div class="light-orb orb-2"></div>
<div class="light-orb orb-3"></div>

<!-- Seletor de Idioma -->
<div class="lang-switcher" id="langSwitcher">
    <button class="lang-btn" onclick="changeLanguage('pt-br')" id="btn-pt">PT</button>
    <button class="lang-btn" onclick="changeLanguage('en')" id="btn-en">EN</button>
</div>

<div class="container">
    <div class="logo">
        <h1>
            <i class="fa-regular fa-star north-star"></i>
            North Studios
        </h1>
        <p class="subtitle" data-i18n="hubSubtitle">Selo Independente</p>
        <div class="divider"></div>
    </div>

    <div class="artists-grid">
        <!-- Card do Soltryx -->
        <a href="soltryx.html" class="artist-card">
            <img src="covers/soltryx/soltryxlogo.png" alt="Soltryx" onerror="this.src='https://via.placeholder.com/200x200/222/fff?text=SOLTRYX'">
            <h2>Soltryx</h2>
            <p data-i18n="hubSoltryxDesc">Explorando novos universos sonoros através de beats eletrônicos e jazz.</p>
        </a>

        <!-- Card do Orange Isle -->
        <a href="orangeisle.html" class="artist-card">
            <img src="covers/orangeisle/orangelogo.png" alt="Orange Isle" onerror="this.src='https://via.placeholder.com/200x200/222/fff?text=ORANGE+ISLE'">
            <h2>Orange Isle</h2>
            <p data-i18n="hubOrangeDesc">Novos sentimentos sonoros. Bossa nova e jazz introspectivo.</p>
        </a>
    </div>

    <footer>
        <p>© 2026 North Studios. <a href="mailto:northstudiosbr@gmail.com">northstudiosbr@gmail.com</a></p>
    </footer>
</div>

<!-- Scripts de tradução -->
<script src="lang/pt.js"></script>
<script src="lang/en.js"></script>
<script src="i18n.js"></script>

<!-- Marca o idioma ativo no seletor -->
<script>
  (function() {
    const currentLang = localStorage.getItem('i18n_lang') || 'pt-br';
    const btnPT = document.getElementById('btn-pt');
    const btnEN = document.getElementById('btn-en');
    if (btnPT && btnEN) {
      btnPT.classList.toggle('active', currentLang === 'pt-br');
      btnEN.classList.toggle('active', currentLang === 'en');
    }
  })();
</script>
</body>
</html>
