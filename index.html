<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North Studios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }
        .logo h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 1rem;
            color: #fff;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 4rem;
            font-size: 1.2rem;
        }
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }
        .artist-card {
            background-color: #111;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 2rem;
            transition: transform 0.3s, border-color 0.3s;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .artist-card:hover {
            transform: translateY(-5px);
            border-color: #555;
        }
        .artist-card img {
            width: 100%;
            max-width: 200px;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .artist-card h2 {
            font-size: 2rem;
            font-weight: 700;
        }
        .artist-card p {
            color: #aaa;
            font-size: 0.9rem;
        }
        footer {
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
        footer a {
            color: #aaa;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>North Studios</h1>
            <p class="subtitle">Selo Independente</p>
        </div>

        <div class="artists-grid">
            <!-- Card do Soltryx -->
            <a href="soltryx.html" class="artist-card">
                <img src="covers/soltryx/soltryxlogo.png" alt="Soltryx" onerror="this.src='https://via.placeholder.com/200x200/222/fff?text=SOLTRYX'">
                <h2>Soltryx</h2>
                <p>Explorando novos universos sonoros através de beats eletrônicos e jazz.</p>
            </a>

            <!-- Card do Orange Isle -->
            <a href="orangeisle.html" class="artist-card">
                <img src="covers/orangeisle/orangelogo.png" alt="Orange Isle" onerror="this.src='https://via.placeholder.com/200x200/222/fff?text=ORANGE+ISLE'">
                <h2>Orange Isle</h2>
                <p>Novos sentimentos sonoros. Bossa nova e jazz introspectivo.</p>
            </a>
        </div>

        <footer>
            <p>© 2026 North Studios. <a href="mailto:northstudios@gmail.com">northstudios@gmail.com</a></p>
        </footer>
    </div>
</body>
</html>
